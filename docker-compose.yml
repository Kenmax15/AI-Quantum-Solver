services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ai_quantum_api
    ports:
      - "8000:8000"

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: ai_quantum_streamlit
    ports:
      - "8501:8501"
    depends_on:
      - api